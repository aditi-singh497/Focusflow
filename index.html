<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FocusFlow — Gentle Productivity</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ================= HERO ================= -->
  <header class="hero">
    <h1>FocusFlow</h1>
    <p class="tagline">A calm space to think, focus, and reflect.</p>

    <nav class="day-nav">
      <button class="day-btn" data-target="dump">Morning</button>
      <button class="day-btn" data-target="focus">Midday</button>
      <button class="day-btn" data-target="reflect">Evening</button>
    </nav>
  </header>

  <!-- ================= PANELS ================= -->
  <div class="panels-container">

    <!-- ===== Morning ===== -->
    <section class="panel is-active" id="dump">
      <h2>Morning Brain Dump</h2>
      <p class="section-sub">Unload thoughts. No structure required.</p>

      <textarea id="dumpInput" placeholder="Write freely..."></textarea>
      <button class="btn" id="saveDump">Save</button>
    </section>

    <!-- ===== Midday ===== -->
    <section class="panel" id="focus">
      <h2>Midday Focus</h2>
      <p class="section-sub">Choose one thing that matters today.</p>

      <select id="focusSelect"></select>
      <button class="btn" id="setFocus">Set Focus</button>

      <div class="focus-display" id="focusDisplay"></div>
    </section>

    <!-- ===== Evening ===== -->
    <section class="panel" id="reflect">
      <h2>Evening Reflection</h2>
      <p class="section-sub">Close the day gently.</p>

      <textarea id="reflectionInput" placeholder="What went well?"></textarea>
      <button class="btn" id="saveReflection">Save Reflection</button>

      <div class="reflection-list" id="reflectionList"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
